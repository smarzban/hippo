# hippo eval is NOT run here — it needs real embeddings (Ollama/OpenAI); it stays a local gate.
name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run pytest
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
        working-directory: ui
      - run: npm test
        working-directory: ui
      - run: npm run build
        working-directory: ui
